services:
  app:
    build: .
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      GIN_MODE: release
      MYSQL_HOST: mysql:3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-PXDN93VRKUm8TeE7}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-G62m50oigInC30sf}
      KAFKA_BROKER: kafka:9092
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      JWT_SECRET: ${JWT_SECRET:-replace-this-in-production}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-replace-admin-secret-in-production}
      ADMIN_INITIAL_USER: ${ADMIN_INITIAL_USER:-admin}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-Admin@123}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SEARCH_INDEX: ${SEARCH_INDEX:-gin-looklook-homestay-v1}
      WX_APP_ID: ${WX_APP_ID:-}
      WX_APP_SECRET: ${WX_APP_SECRET:-}
      WX_MCH_ID: ${WX_MCH_ID:-}
      WX_MCH_CERT_SERIAL: ${WX_MCH_CERT_SERIAL:-}
      WX_MCH_PRIVATE_KEY: ${WX_MCH_PRIVATE_KEY:-}
      WX_API_V3_KEY: ${WX_API_V3_KEY:-}
      WX_NOTIFY_URL: ${WX_NOTIFY_URL:-}
    ports: ["8080:8080", "4000:4000"]
    depends_on:
      mysql: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_started}
      elasticsearch: {condition: service_started}

  nginx-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["8888:8081"]
    volumes: ["./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro"]
    depends_on: [app]

  mysql:
    image: mysql/mysql-server:8.0.28
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-PXDN93VRKUm8TeE7}
      MYSQL_ROOT_HOST: "%"
    command: ["--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_general_ci", "--lower_case_table_names=1"]
    ports: ["33069:3306"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:6.2.5
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-G62m50oigInC30sf}", "--appendonly", "yes"]
    ports: ["36379:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-G62m50oigInC30sf}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.0
    ports: ["9094:9094"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://localhost:9093,PLAINTEXT_CONTAINER://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094,PLAINTEXT_CONTAINER://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_CONTAINER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes: ["kafka-data:/var/lib/kafka/data"]

  asynqmon:
    image: hibiken/asynqmon:latest
    command: ["--redis-addr=redis:6379", "--redis-password=${REDIS_PASSWORD:-G62m50oigInC30sf}"]
    ports: ["8980:8080"]
    depends_on: [redis]

  elasticsearch:
    image: elasticsearch:8.12.2
    environment: ["discovery.type=single-node", "xpack.security.enabled=false", "ES_JAVA_OPTS=-Xms512m -Xmx512m"]
    ports: ["9200:9200"]
    volumes: ["es-data:/usr/share/elasticsearch/data"]

  kibana:
    image: kibana:8.12.2
    environment: ["ELASTICSEARCH_HOSTS=http://elasticsearch:9200", "XPACK_SECURITY_ENABLED=false", "I18N_LOCALE=zh-CN"]
    ports: ["5601:5601"]
    depends_on: [elasticsearch]

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    environment: ["SPAN_STORAGE_TYPE=elasticsearch", "ES_SERVER_URLS=http://elasticsearch:9200"]
    ports: ["16686:16686", "14268:14268"]
    depends_on: [elasticsearch]

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes: ["./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro", "prometheus-data:/prometheus"]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.1.4
    ports: ["3001:3000"]
    volumes: ["grafana-data:/var/lib/grafana"]

  filebeat:
    image: elastic/filebeat:8.12.2
    user: root
    command: ["filebeat", "-e", "-strict.perms=false"]
    volumes:
      - ./deploy/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [kafka]

  go-stash:
    image: kevinwan/go-stash:1.1.1
    volumes: ["./deploy/go-stash.yaml:/app/etc/config.yaml:ro"]
    depends_on: [kafka, elasticsearch]

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  es-data:
  prometheus-data:
  grafana-data:
